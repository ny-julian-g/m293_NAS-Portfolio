<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAS Portfolio – Kontakt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container container--no-sidebar">
        <header class="header">
            <nav class="breadcrumb">
                <a href="index.html" class="breadcrumb-link">Home</a>
            </nav>
            <div class="box header-title">Titel</div>
        </header>

        <main class="main-content">
            <!-- Hero: Teambild + Headline -->
            <section class="contact-hero">
                <div class="team-image box">Bild von Team</div>
                <div class="contact-hero-text">
                    <h1 class="contact-headline">Kontaktiere uns!</h1>
                </div>
            </section>

            <!-- Kontaktformular -->
            <section class="contact-form-section box">
                <h2>Kontaktformular</h2>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Dein Name">
                </div>
                <div class="form-group">
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="email" placeholder="deine@email.ch">
                </div>
                <div class="form-group">
                    <label for="message">Nachricht</label>
                    <textarea id="message" name="message" rows="5" placeholder="Deine Nachricht..."></textarea>
                </div>
                <button type="button" class="submit-btn">Absenden</button>
            </section>

            <!-- Team -->
            <section class="team-section">
                <h2 class="team-title">Team</h2>
                <div class="team-grid">
                    <div class="team-member box">Teammitglied 1</div>
                    <div class="team-member box">Teammitglied 2</div>
                    <div class="team-member box">Teammitglied 3</div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="box">Footer mit Kontakt</div>
        </footer>
    </div>

</body>
</html>
