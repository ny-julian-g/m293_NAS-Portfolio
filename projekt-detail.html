<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NAS Portfolio - Projekt Detail</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="container container--no-sidebar">
    <header class="header">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html" class="breadcrumb-link">Home</a>
        <span class="breadcrumb-sep">›</span>
        <a href="projekte.html" class="breadcrumb-link">Projekte</a>
      </nav>
      <h1 class="box header-title">Projekt Detail</h1>
    </header>

    <main class="main-content">
      <section class="detail-section" aria-labelledby="detail-title">
        <figure class="detail-media">
          <figcaption>Bild oder Video zum Projekt</figcaption>
        </figure>

        <article class="detail-info">
          <h2 id="detail-title" class="detail-project-title">Projekt</h2>
          <h3 class="detail-description-title">Beschreibung</h3>
          <p class="detail-description-text">
            Diese Detailseite bietet Platz für eine Projektbeschreibung,
            Hintergrundinformationen, technische Entscheidungen und Hinweise
            zur Umsetzung.
          </p>
          <a href="kontakt.html" class="contact-link">Zum Kontaktformular</a>
        </article>
      </section>
    </main>

    <footer class="footer">
      <p class="footer-copy">Fragen zum Projekt? Wir helfen weiter.</p>
      <a href="kontakt.html" class="footer-link">Kontakt</a>
    </footer>
  </body>
</html>
